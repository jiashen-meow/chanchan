<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>白日梦蓝 · 金铲铲非遗联名</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --gold: #c8a84b;
  --gold-light: #e8cc78;
  --gold-dark: #8a6e28;
  --cloisonne-blue: #2a5f9e;
  --cloisonne-teal: #1e8c7a;
  --cloisonne-deep: #1a3a6e;
  --ink: #2c2416;
  --paper: #f5f0e8;
}

html, body {
  width: 100%;
  overflow-x: hidden;
  font-family: "Noto Serif SC", "PingFang SC", "STSong", serif;
}

/* ── SCROLL CONTAINER ── */
.page {
  width: 100%;
  min-height: 100vh;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
}

#page1 { background-image: url("H5-1.png"); }
#page2 { background-image: url("H5-2.png"); }
#page3 { background-image: url("H5-3.png"); }

/* ════════════════════════
   PAGE 1 — HERO
════════════════════════ */
#page1 {
  justify-content: flex-end;
  padding: 0 0 48px;
}

/* Logo */
.logo-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 36px;
  animation: fadeUp 0.9s ease both;
}

.feiyi-badge {
  position: absolute;
  top: -8px;
  right: -18px;
  background: linear-gradient(135deg, #c8a84b, #8a6e28);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 3px 8px 3px 9px;
  border-radius: 2px;
  box-shadow: 0 2px 8px rgba(200,168,75,0.4);
  z-index: 10;
}

/* SVG Logo — cloisonné shovel */
.logo-svg-wrap {
  width: 120px;
  height: 140px;
  filter: drop-shadow(0 4px 16px rgba(42,95,158,0.3));
}

/* Hero text */
.hero-text {
  text-align: center;
  animation: fadeUp 1s 0.2s ease both;
}

.title-main {
  font-size: 44px;
  font-weight: 900;
  letter-spacing: 12px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 12px;
  position: relative;
}
.title-main::after {
  content: "";
  display: block;
  width: 60px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 14px auto 0;
}

.title-sub {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--cloisonne-blue);
  font-weight: 400;
  margin-top: 14px;
  opacity: 0.85;
}

/* Cloisonné decorative divider */
.cloisonne-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 28px auto;
  animation: fadeUp 1s 0.35s ease both;
}
.div-line {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}
.div-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
.div-gem {
  width: 22px; height: 22px;
}

/* Scroll hint */
.scroll-hint {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  animation: fadeUp 1s 0.6s ease both, bob 2s 1.6s ease-in-out infinite;
}
.scroll-text {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--gold-dark);
  opacity: 0.6;
}
.scroll-arrow {
  width: 14px; height: 14px;
  border-right: 1.5px solid var(--gold-dark);
  border-bottom: 1.5px solid var(--gold-dark);
  transform: rotate(45deg);
  opacity: 0.5;
}

/* ════════════════════════
   PAGE 2 — GAME PLACEHOLDER
════════════════════════ */
#page2 {
  justify-content: flex-start;
  padding: 64px 28px 80px;
}

.page2-header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeUp 0.8s ease both;
}
.p2-eyebrow {
  font-size: 9px;
  letter-spacing: 5px;
  color: var(--cloisonne-blue);
  opacity: 0.7;
  margin-bottom: 8px;
}
.p2-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 5px;
  margin-bottom: 6px;
}
.p2-sub {
  font-size: 11px;
  color: var(--gold-dark);
  letter-spacing: 2px;
  opacity: 0.7;
}

/* 4-step process cards */
.steps-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  margin-bottom: 32px;
}

.step-card {
  background: rgba(245,240,232,0.75);
  border: 1px solid rgba(200,168,75,0.3);
  border-radius: 8px;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  transition: transform 0.2s, box-shadow 0.2s;
}
.step-card:active { transform: scale(0.97); }

.step-num {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gold);
  font-weight: 700;
}
.step-icon {
  width: 48px; height: 48px;
}
.step-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 2px;
}
.step-name-en {
  font-size: 9px;
  color: var(--cloisonne-blue);
  letter-spacing: 1px;
  opacity: 0.65;
}

/* Coming soon overlay */
.coming-soon-wrap {
  position: relative;
  width: 100%;
  max-width: 340px;
  margin-bottom: 28px;
}
.coming-label {
  width: 100%;
  background: rgba(245,240,232,0.8);
  border: 1px solid rgba(200,168,75,0.35);
  border-radius: 6px;
  padding: 14px;
  text-align: center;
  backdrop-filter: blur(4px);
}
.coming-label span {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--gold-dark);
  opacity: 0.7;
}

/* CTA button */
.cta-btn {
  padding: 14px 40px;
  background: linear-gradient(135deg, var(--cloisonne-blue), var(--cloisonne-deep));
  border: none;
  border-radius: 30px;
  color: #fff;
  font-family: "Noto Serif SC", serif;
  font-size: 13px;
  letter-spacing: 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(42,95,158,0.3);
  transition: all 0.3s;
}
.cta-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(200,168,75,0.2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.cta-btn:active::before { opacity: 1; }
.cta-btn:active { transform: scale(0.97); }

/* Cloisonné corner decoration */
.corner-deco {
  position: absolute;
  pointer-events: none;
}

/* ════════════════════════
   PAGE 3 — DOCUMENTARY
════════════════════════ */
#page3 {
  justify-content: flex-start;
  padding: 64px 28px 80px;
}

.page3-header {
  text-align: center;
  margin-bottom: 28px;
  width: 100%;
}
.p3-eyebrow {
  font-size: 9px;
  letter-spacing: 5px;
  color: var(--cloisonne-blue);
  opacity: 0.7;
  margin-bottom: 8px;
}
.p3-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 5px;
}

/* Video placeholder */
.video-wrap {
  width: 100%;
  max-width: 340px;
  aspect-ratio: 16/9;
  background: rgba(245,240,232,0.6);
  border: 1px solid rgba(200,168,75,0.4);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  margin-bottom: 28px;
  backdrop-filter: blur(4px);
  cursor: pointer;
  transition: border-color 0.3s;
}
.video-wrap:active { border-color: rgba(200,168,75,0.8); }

/* Cloisonné corner accents on video */
.v-corner {
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.6;
}
.v-corner.tl { top: 8px; left: 8px; border-width: 1.5px 0 0 1.5px; }
.v-corner.tr { top: 8px; right: 8px; border-width: 1.5px 1.5px 0 0; }
.v-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1.5px 1.5px; }
.v-corner.br { bottom: 8px; right: 8px; border-width: 0 1.5px 1.5px 0; }

.play-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(42,95,158,0.15);
  border: 1.5px solid rgba(42,95,158,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  transition: all 0.3s;
}
.video-wrap:active .play-btn {
  background: rgba(42,95,158,0.3);
  border-color: var(--cloisonne-blue);
}
.play-triangle {
  width: 0; height: 0;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  border-left: 16px solid var(--cloisonne-blue);
  margin-left: 4px;
  opacity: 0.7;
}
.video-label {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--ink);
  opacity: 0.5;
}
.video-sub {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--cloisonne-blue);
  opacity: 0.5;
  margin-top: 4px;
}

/* Text content */
.text-block {
  width: 100%;
  max-width: 340px;
  background: rgba(245,240,232,0.65);
  border: 1px solid rgba(200,168,75,0.2);
  border-radius: 8px;
  padding: 22px 20px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  position: relative;
}

/* Gold wire top accent */
.text-block::before {
  content: "";
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.text-content {
  font-size: 13px;
  line-height: 2.2;
  color: var(--ink);
  opacity: 0.75;
  letter-spacing: 0.5px;
}
.text-content .highlight {
  color: var(--cloisonne-blue);
  font-weight: 700;
}

.text-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid rgba(200,168,75,0.2);
}
.text-footer-logo {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--gold-dark);
  opacity: 0.5;
}

/* ════════════════════════
   ANIMATIONS
════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes bob {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(6px); }
}
@keyframes spinSlow {
  to { transform: rotate(360deg); }
}

/* Scroll-triggered fade */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }
</style>
</head>
<body>

<!-- ════ PAGE 1: HERO ════ -->
<div class="page" id="page1">

  <!-- Scroll hint only -->
  <div class="scroll-hint">
    <div class="scroll-text">向下探索</div>
    <div class="scroll-arrow"></div>
  </div>

</div>

<!-- ════ PAGE 2: GAME PLACEHOLDER ════ -->
<div class="page" id="page2">

  <div class="page2-header reveal">
    <div class="p2-eyebrow">非遗体验</div>
    <div class="p2-title">亲手做一件</div>
    <div class="p2-sub">景泰蓝工艺 · 四道工序</div>
  </div>

  <!-- 4 Step Cards -->
  <div class="steps-grid">
    <div class="step-card reveal reveal-delay-1">
      <div class="step-num">STEP 01</div>
      <svg class="step-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="40" height="40" rx="4" fill="none" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>
        <!-- Brush strokes -->
        <path d="M12,36 Q18,26 24,24 Q30,22 36,14" stroke="#2a5f9e" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M10,30 Q16,28 20,32" stroke="#1e8c7a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Brush tip -->
        <path d="M34,12 L38,8 L40,12 L36,14 Z" fill="#c8a84b"/>
        <!-- Guide dots -->
        <circle cx="24" cy="24" r="2" fill="none" stroke="#c8a84b" stroke-width="0.8" stroke-dasharray="2,1"/>
      </svg>
      <div class="step-name">描图案</div>
      <div class="step-name-en">SKETCH</div>
    </div>

    <div class="step-card reveal reveal-delay-2">
      <div class="step-num">STEP 02</div>
      <svg class="step-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="40" height="40" rx="4" fill="none" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>
        <!-- Wire coils -->
        <path d="M10,16 Q18,10 26,16 Q34,22 42,16" stroke="#c8a84b" stroke-width="1.5" fill="none"/>
        <path d="M10,24 Q18,18 26,24 Q34,30 42,24" stroke="#c8a84b" stroke-width="1.5" fill="none"/>
        <path d="M10,32 Q18,26 26,32 Q34,38 42,32" stroke="#c8a84b" stroke-width="1.5" fill="none"/>
        <!-- Wire cross lines -->
        <line x1="20" y1="12" x2="20" y2="36" stroke="#c8a84b" stroke-width="0.8" opacity="0.4"/>
        <line x1="32" y1="12" x2="32" y2="36" stroke="#c8a84b" stroke-width="0.8" opacity="0.4"/>
      </svg>
      <div class="step-name">掐丝</div>
      <div class="step-name-en">WIRE</div>
    </div>

    <div class="step-card reveal reveal-delay-3">
      <div class="step-num">STEP 03</div>
      <svg class="step-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="40" height="40" rx="4" fill="none" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>
        <!-- Enamel cells -->
        <path d="M8,8 L22,8 L22,22 L8,22 Z" fill="#2a5f9e" stroke="#c8a84b" stroke-width="1" opacity="0.8"/>
        <path d="M24,8 L40,8 L40,22 L24,22 Z" fill="#1e8c7a" stroke="#c8a84b" stroke-width="1" opacity="0.8"/>
        <path d="M8,24 L22,24 L22,40 L8,40 Z" fill="#1e8c7a" stroke="#c8a84b" stroke-width="1" opacity="0.8"/>
        <path d="M24,24 L40,24 L40,40 L24,40 Z" fill="#c04830" stroke="#c8a84b" stroke-width="1" opacity="0.6"/>
        <!-- Drop icon -->
        <path d="M32,27 Q32,34 36,34 Q40,34 40,30 Q40,27 36,25 Z" fill="#3a6fae" opacity="0.6"/>
      </svg>
      <div class="step-name">点蓝</div>
      <div class="step-name-en">ENAMEL</div>
    </div>

    <div class="step-card reveal reveal-delay-4">
      <div class="step-num">STEP 04</div>
      <svg class="step-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="40" height="40" rx="4" fill="none" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>
        <!-- Kiln circle -->
        <circle cx="24" cy="24" r="14" fill="none" stroke="#c04830" stroke-width="1.5" opacity="0.5"/>
        <circle cx="24" cy="24" r="9" fill="rgba(200,72,48,0.15)" stroke="#c04830" stroke-width="1" opacity="0.6"/>
        <!-- Flame shapes -->
        <path d="M20,30 Q18,24 22,20 Q21,26 24,22 Q23,28 26,24 Q28,20 30,22 Q27,26 28,30 Z"
              fill="#c04830" opacity="0.7"/>
        <!-- Sparkles -->
        <circle cx="16" cy="18" r="1.5" fill="#e8cc78" opacity="0.7"/>
        <circle cx="32" cy="16" r="1.5" fill="#e8cc78" opacity="0.7"/>
        <circle cx="34" cy="30" r="1" fill="#e8cc78" opacity="0.5"/>
      </svg>
      <div class="step-name">烧制</div>
      <div class="step-name-en">FIRE</div>
    </div>
  </div>

  <!-- Coming soon label -->
  <div class="coming-soon-wrap reveal">
    <div class="coming-label">
      <span>· 互动体验即将开启 ·</span>
    </div>
  </div>

  <!-- CTA -->
  <button class="cta-btn reveal" onclick="alert('跳转至游戏内商城')">
    进入游戏查看棋盘皮肤 →
  </button>

</div>

<!-- ════ PAGE 3: DOCUMENTARY ════ -->
<div class="page" id="page3">

  <div class="page3-header reveal">
    <div class="p3-eyebrow">千年传承</div>
    <div class="p3-title">纪录片</div>
  </div>

  <!-- Video Placeholder -->
  <div class="video-wrap reveal" onclick="alert('视频即将上线')">
    <div class="v-corner tl"></div>
    <div class="v-corner tr"></div>
    <div class="v-corner bl"></div>
    <div class="v-corner br"></div>
    <div class="play-btn">
      <div class="play-triangle"></div>
    </div>
    <div class="video-label">白日梦蓝 · 纪录片</div>
    <div class="video-sub">走进景泰蓝传承人的工坊</div>
  </div>

  <!-- Text block -->
  <div class="text-block reveal">
    <p class="text-content">
      <span class="highlight">景泰蓝</span>，又称铜胎掐丝珐琅，是中国国家级非物质文化遗产。从元代传入，于<span class="highlight">明景泰年间</span>达到顶峰——以铜为胎，金丝为骨，历经掐丝、点蓝、烧制千火，方成一件旷世之蓝。此次联名，将这门<span class="highlight">六百年的宫廷工艺</span>，带入金铲铲的棋盘世界。
    </p>
    <div class="text-footer">
      <div class="text-footer-logo">白日梦蓝 · 金铲铲非遗联名</div>
    </div>
  </div>

</div>

<script>
// Scroll reveal
const reveals = document.querySelectorAll(".reveal");
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add("visible");
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.15 });
reveals.forEach(el => observer.observe(el));
<\/script>
</body>
</html>

/* ════════════════════════
   PAGE 1 — HERO
════════════════════════ */
#page1 {
  justify-content: center;
  padding: 60px 32px 80px;
  gap: 0;
}

/* Logo */
.logo-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 36px;
  animation: fadeUp 0.9s ease both;
}

.feiyi-badge {
  position: absolute;
  top: -8px;
  right: -18px;
  background: linear-gradient(135deg, #c8a84b, #8a6e28);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 3px 8px 3px 9px;
  border-radius: 2px;
  box-shadow: 0 2px 8px rgba(200,168,75,0.4);
  z-index: 10;
}

/* SVG Logo — cloisonné shovel */
.logo-svg-wrap {
  width: 120px;
  height: 140px;
  filter: drop-shadow(0 4px 16px rgba(42,95,158,0.3));
}

/* Hero text */
.hero-text {
  text-align: center;
  animation: fadeUp 1s 0.2s ease both;
}

.title-main {
  font-size: 44px;
  font-weight: 900;
  letter-spacing: 12px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 12px;
  position: relative;
}
.title-main::after {
  content: "";
  display: block;
  width: 60px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 14px auto 0;
}

.title-sub {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--cloisonne-blue);
  font-weight: 400;
  margin-top: 14px;
  opacity: 0.85;
}

/* Cloisonné decorative divider */
.cloisonne-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 28px auto;
  animation: fadeUp 1s 0.35s ease both;
}
.div-line {
  width: 50px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}
.div-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
.div-gem {
  width: 22px; height: 22px;
}

/* Scroll hint */
.scroll-hint {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  animation: fadeUp 1s 0.6s ease both, bob 2s 1.6s ease-in-out infinite;
}
.scroll-text {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--gold-dark);
  opacity: 0.6;
}
.scroll-arrow {
  width: 14px; height: 14px;
  border-right: 1.5px solid var(--gold-dark);
  border-bottom: 1.5px solid var(--gold-dark);
  transform: rotate(45deg);
  opacity: 0.5;
}

/* ════════════════════════
   PAGE 2 — GAME PLACEHOLDER
════════════════════════ */
#page2 {
  justify-content: flex-start;
  padding: 64px 28px 80px;
}

.page2-header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeUp 0.8s ease both;
}
.p2-eyebrow {
  font-size: 9px;
  letter-spacing: 5px;
  color: var(--cloisonne-blue);
  opacity: 0.7;
  margin-bottom: 8px;
}
.p2-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 5px;
  margin-bottom: 6px;
}
.p2-sub {
  font-size: 11px;
  color: var(--gold-dark);
  letter-spacing: 2px;
  opacity: 0.7;
}

/* 4-step process cards */
.steps-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  margin-bottom: 32px;
}

.step-card {
  background: rgba(245,240,232,0.75);
  border: 1px solid rgba(200,168,75,0.3);
  border-radius: 8px;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  transition: transform 0.2s, box-shadow 0.2s;
}
.step-card:active { transform: scale(0.97); }

.step-num {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gold);
  font-weight: 700;
}
.step-icon {
  width: 48px; height: 48px;
}
.step-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 2px;
}
.step-name-en {
  font-size: 9px;
  color: var(--cloisonne-blue);
  letter-spacing: 1px;
  opacity: 0.65;
}

/* Coming soon overlay */
.coming-soon-wrap {
  position: relative;
  width: 100%;
  max-width: 340px;
  margin-bottom: 28px;
}
.coming-label {
  width: 100%;
  background: rgba(245,240,232,0.8);
  border: 1px solid rgba(200,168,75,0.35);
  border-radius: 6px;
  padding: 14px;
  text-align: center;
  backdrop-filter: blur(4px);
}
.coming-label span {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--gold-dark);
  opacity: 0.7;
}

/* CTA button */
.cta-btn {
  padding: 14px 40px;
  background: linear-gradient(135deg, var(--cloisonne-blue), var(--cloisonne-deep));
  border: none;
  border-radius: 30px;
  color: #fff;
  font-family: "Noto Serif SC", serif;
  font-size: 13px;
  letter-spacing: 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(42,95,158,0.3);
  transition: all 0.3s;
}
.cta-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(200,168,75,0.2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.cta-btn:active::before { opacity: 1; }
.cta-btn:active { transform: scale(0.97); }

/* Cloisonné corner decoration */
.corner-deco {
  position: absolute;
  pointer-events: none;
}

/* ════════════════════════
   PAGE 3 — DOCUMENTARY
════════════════════════ */
#page3 {
  justify-content: flex-start;
  padding: 64px 28px 80px;
}

.page3-header {
  text-align: center;
  margin-bottom: 28px;
  width: 100%;
}
.p3-eyebrow {
  font-size: 9px;
  letter-spacing: 5px;
  color: var(--cloisonne-blue);
  opacity: 0.7;
  margin-bottom: 8px;
}
.p3-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 5px;
}

/* Video placeholder */
.video-wrap {
  width: 100%;
  max-width: 340px;
  aspect-ratio: 16/9;
  background: rgba(245,240,232,0.6);
  border: 1px solid rgba(200,168,75,0.4);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  margin-bottom: 28px;
  backdrop-filter: blur(4px);
  cursor: pointer;
  transition: border-color 0.3s;
}
.video-wrap:active { border-color: rgba(200,168,75,0.8); }

/* Cloisonné corner accents on video */
.v-corner {
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.6;
}
.v-corner.tl { top: 8px; left: 8px; border-width: 1.5px 0 0 1.5px; }
.v-corner.tr { top: 8px; right: 8px; border-width: 1.5px 1.5px 0 0; }
.v-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1.5px 1.5px; }
.v-corner.br { bottom: 8px; right: 8px; border-width: 0 1.5px 1.5px 0; }

.play-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(42,95,158,0.15);
  border: 1.5px solid rgba(42,95,158,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  transition: all 0.3s;
}
.video-wrap:active .play-btn {
  background: rgba(42,95,158,0.3);
  border-color: var(--cloisonne-blue);
}
.play-triangle {
  width: 0; height: 0;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  border-left: 16px solid var(--cloisonne-blue);
  margin-left: 4px;
  opacity: 0.7;
}
.video-label {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--ink);
  opacity: 0.5;
}
.video-sub {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--cloisonne-blue);
  opacity: 0.5;
  margin-top: 4px;
}

/* Text content */
.text-block {
  width: 100%;
  max-width: 340px;
  background: rgba(245,240,232,0.65);
  border: 1px solid rgba(200,168,75,0.2);
  border-radius: 8px;
  padding: 22px 20px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  position: relative;
}

/* Gold wire top accent */
.text-block::before {
  content: "";
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);

  line-height: 2.2;
  color: var(--ink);
  opacity: 0.75;
  letter-spacing: 0.5px;

  font-weight: 700;
}

.text-footer {

  justify-content: flex-end;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid rgba(200,168,75,0.2);
}

  letter-spacing: 3px;
  color: var(--gold-dark);
  opacity: 0.5;
}

/* ════════════════════════
   ANIMATIONS
════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes bob {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(6px); }
}
@keyframes spinSlow {
  to { transform: rotate(360deg); }
}

/* Scroll-triggered fade */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

</head>

<script>
// Scroll reveal
const reveals = document.querySelectorAll(".reveal");
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add("visible");
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.15 });
reveals.forEach(el => observer.observe(el));
<\/script>
